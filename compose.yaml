services:
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      GAS_BUNDLE_DIR: /app
      GAS_DATA_DIR: /data
      GAS_DIAGNOSIS_HOST: 0.0.0.0
      GAS_DIAGNOSIS_PORT: 8080
      GAS_TRUST_PROXY: "1"
      GAS_MAX_UPLOAD_MB: ${GAS_MAX_UPLOAD_MB:-50}
      GAS_SERVER_THREADS: ${GAS_SERVER_THREADS:-8}
      GAS_RETENTION_DAYS: ${GAS_RETENTION_DAYS:-30}
      GAS_LOG_LEVEL: ${GAS_LOG_LEVEL:-INFO}
      GAS_PDF_TIMEOUT_SECONDS: ${GAS_PDF_TIMEOUT_SECONDS:-60}
      GAS_CHROMIUM_PATH: ${GAS_CHROMIUM_PATH:-/usr/bin/chromium}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_API_URL: ${DEEPSEEK_API_URL:-https://api.deepseek.com/chat/completions}
    volumes:
      - diagnosis_data:/data
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys,urllib.request; response=urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3); sys.exit(0 if response.status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    security_opt:
      - no-new-privileges:true

volumes:
  diagnosis_data:
