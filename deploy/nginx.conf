worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    log_format diagnosis '$remote_addr - $request_id [$time_local] "$request" '
                         '$status $body_bytes_sent "$http_referer" '
                         '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log diagnosis;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript;

    limit_req_zone $binary_remote_addr zone=diagnosis_api:10m rate=30r/m;

    upstream diagnosis_app {
        server app:8080;
        keepalive 16;
    }

    server {
        listen 80;
        client_max_body_size 50m;

        location = /healthz {
            proxy_pass http://diagnosis_app;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
        }

        location = /api/upload {
            limit_req zone=diagnosis_api burst=5 nodelay;
            proxy_pass http://diagnosis_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location = /api/llm_analysis {
            limit_req zone=diagnosis_api burst=10 nodelay;
            proxy_pass http://diagnosis_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 90s;
        }

        location / {
            proxy_pass http://diagnosis_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
